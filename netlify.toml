[build]
  command = "pnpm run build:netlify"
  publish = "artifacts/kwanzavisa/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  BASE_PATH = "/"
  PORT = "3000"

# Variável de ambiente obrigatória no painel do Netlify:
# VITE_API_BASE_URL = "https://url-do-seu-servidor-api.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
