openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KwanzaVisa API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: orders
  - name: exchange
  - name: admin
  - name: auth
  - name: kyc
  - name: cards
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/lookup:
    get:
      operationId: lookupOrders
      tags: [orders]
      parameters:
        - name: contact
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Orders found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderLookupResult"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exchange/rate:
    get:
      operationId: getExchangeRate
      tags: [exchange]
      parameters:
        - name: currency
          in: query
          required: true
          schema:
            type: string
            enum: [USD]
        - name: amount
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Exchange rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateResponse"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: service
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrdersResponse"

  /admin/orders/{id}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/orders/{id}/note:
    patch:
      operationId: adminUpdateOrderNote
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderNoteBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /admin/orders/{id}/cost:
    patch:
      operationId: adminUpdateOrderCost
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderCostBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /admin/orders/{id}/detail:
    get:
      operationId: adminGetOrderDetail
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail with note, cost, history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/stats/daily:
    get:
      operationId: adminGetDailyStats
      tags: [admin]
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Daily order counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyStatsResponse"

  /admin/exchange-rates:
    get:
      operationId: adminGetExchangeRates
      tags: [admin]
      responses:
        "200":
          description: Current rates and history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminExchangeRatesResponse"
    put:
      operationId: adminSetExchangeRate
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetExchangeRateBody"
      responses:
        "200":
          description: Rate updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateRecord"

  /admin/clients:
    get:
      operationId: adminListClients
      tags: [admin]
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientsResponse"

  /admin/clients/{email}:
    get:
      operationId: adminGetClient
      tags: [admin]
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"

  /admin/clients/{email}/note:
    patch:
      operationId: adminUpdateClientNote
      tags: [admin]
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientNoteBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"

  /admin/reports:
    get:
      operationId: adminGetReports
      tags: [admin]
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Financial and operational report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReportsResponse"

  /admin/balances:
    get:
      operationId: adminGetBalances
      tags: [admin]
      responses:
        "200":
          description: Current balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBalancesResponse"

  /admin/balances/{account}:
    put:
      operationId: adminUpdateBalance
      tags: [admin]
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBalanceBody"
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceRecord"

  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Registar conta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Conta criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Dados inválidos
        "409":
          description: E-mail já registado

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Fazer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais incorrectas

  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Perfil do utilizador autenticado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Não autenticado

  /kyc/upload:
    post:
      operationId: kycUpload
      tags: [kyc]
      summary: Upload de documento KYC
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycUploadBody"
      responses:
        "200":
          description: Documento guardado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /kyc/submit:
    post:
      operationId: kycSubmit
      tags: [kyc]
      summary: Submeter KYC para revisão
      security:
        - bearerAuth: []
      responses:
        "200":
          description: KYC submetido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Documentos em falta

  /kyc/status:
    get:
      operationId: kycGetStatus
      tags: [kyc]
      summary: Estado do KYC do utilizador
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Estado KYC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatusResponse"

  /cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: Listar cartões do utilizador
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de cartões
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCardsResponse"

  /cards/{id}:
    get:
      operationId: getCard
      tags: [cards]
      summary: Detalhe do cartão
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detalhe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardDetailResponse"
        "404":
          description: Não encontrado

  /cards/{id}/toggle-block:
    post:
      operationId: cardToggleBlock
      tags: [cards]
      summary: Bloquear ou desbloquear cartão
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estado alterado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/kyc:
    get:
      operationId: adminListKyc
      tags: [admin]
      summary: Listar pedidos KYC
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista KYC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKycListResponse"

  /admin/kyc/{userId}/documents:
    get:
      operationId: adminGetKycDocuments
      tags: [admin]
      summary: Ver documentos KYC de utilizador
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Documentos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKycDocumentsResponse"

  /admin/kyc/{userId}/review:
    post:
      operationId: adminReviewKyc
      tags: [admin]
      summary: Aprovar ou rejeitar KYC
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminKycReviewBody"
      responses:
        "200":
          description: Revisto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/orders/{id}/issue-card:
    post:
      operationId: adminIssueCard
      tags: [admin]
      summary: Emitir cartão para pedido
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminIssueCardBody"
      responses:
        "200":
          description: Cartão emitido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/cards:
    get:
      operationId: adminListCards
      tags: [admin]
      summary: Listar todos os cartões
      responses:
        "200":
          description: Lista
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminListCardsResponse"

  /admin/cards/{id}/fund:
    post:
      operationId: adminFundCard
      tags: [admin]
      summary: Carregar cartão
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFundCardBody"
      responses:
        "200":
          description: Carregado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    Order:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        service:
          type: string
        platform:
          type: string
          nullable: true
        amountUsd:
          type: number
          nullable: true
        amountKwanza:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        destinationCountry:
          type: string
          nullable: true
        recipientName:
          type: string
          nullable: true
        intlPlatform:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        formattedDate:
          type: string
      required: [id, name, email, whatsapp, service, status, createdAt, formattedDate]

    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            note:
              type: string
              nullable: true
            costKwanza:
              type: number
              nullable: true
            statusHistory:
              type: array
              items:
                $ref: "#/components/schemas/StatusHistoryEntry"

    StatusHistoryEntry:
      type: object
      properties:
        fromStatus:
          type: string
          nullable: true
        toStatus:
          type: string
        changedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        formattedDate:
          type: string
      required: [toStatus, changedBy, createdAt, formattedDate]

    CreateOrderBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        service:
          type: string
          enum: [cartao_virtual, acesso_assistido, transferencia, conta_internacional]
        platform:
          type: string
          nullable: true
        amount:
          type: number
          nullable: true
        currency:
          type: string
          enum: [USD]
          nullable: true
        description:
          type: string
          nullable: true
        destinationCountry:
          type: string
          nullable: true
        recipientName:
          type: string
          nullable: true
        intlPlatform:
          type: string
          enum: [Wise, Bybit, Kast]
          nullable: true
        message:
          type: string
          nullable: true
      required: [name, email, whatsapp, service]

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, em_contacto, aguarda_pagamento, pago, em_processamento, concluido, cancelado]
      required: [status]

    UpdateOrderNoteBody:
      type: object
      properties:
        note:
          type: string
      required: [note]

    UpdateOrderCostBody:
      type: object
      properties:
        costKwanza:
          type: number
      required: [costKwanza]

    OrderLookupResult:
      type: object
      properties:
        name:
          type: string
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        totalSpentKwanza:
          type: number
      required: [orders, totalSpentKwanza]

    ExchangeRateResponse:
      type: object
      properties:
        currency:
          type: string
        ratePerUnit:
          type: number
        amount:
          type: number
        amountKwanza:
          type: number
        updatedAt:
          type: string
      required: [currency, ratePerUnit, amount, amountKwanza, updatedAt]

    AdminOrdersResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [orders, total, page, limit]

    AdminStats:
      type: object
      properties:
        totalOrders:
          type: integer
        totalClients:
          type: integer
        completedOrders:
          type: integer
        pendingOrders:
          type: integer
        totalRevenueKwanza:
          type: number
        totalCostKwanza:
          type: number
        ordersToday:
          type: integer
        ordersThisWeek:
          type: integer
        ordersThisMonth:
          type: integer
        volumeUsdThisMonth:
          type: number
        volumeKwanzaThisMonth:
          type: number
        ordersByService:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalOrders
        - totalClients
        - completedOrders
        - pendingOrders
        - totalRevenueKwanza
        - totalCostKwanza
        - ordersToday
        - ordersThisWeek
        - ordersThisMonth
        - volumeUsdThisMonth
        - volumeKwanzaThisMonth
        - ordersByService

    DailyStatsResponse:
      type: object
      properties:
        days:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer
            required: [date, count]
      required: [days]

    ExchangeRateRecord:
      type: object
      properties:
        id:
          type: integer
        currency:
          type: string
        rate:
          type: number
        previousRate:
          type: number
          nullable: true
        changedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        formattedDate:
          type: string
      required: [id, currency, rate, changedBy, createdAt, formattedDate]

    AdminExchangeRatesResponse:
      type: object
      properties:
        activeUsd:
          type: number
          nullable: true
        lastUpdated:
          type: string
          nullable: true
        lastUpdatedBy:
          type: string
          nullable: true
        history:
          type: array
          items:
            $ref: "#/components/schemas/ExchangeRateRecord"
      required: [history]

    SetExchangeRateBody:
      type: object
      properties:
        currency:
          type: string
          enum: [USD]
        rate:
          type: number
        changedBy:
          type: string
      required: [currency, rate]

    ClientSummary:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        totalOrders:
          type: integer
        totalSpentKwanza:
          type: number
        lastOrderDate:
          type: string
          nullable: true
      required: [name, email, whatsapp, totalOrders, totalSpentKwanza]

    AdminClientsResponse:
      type: object
      properties:
        clients:
          type: array
          items:
            $ref: "#/components/schemas/ClientSummary"
      required: [clients]

    ClientDetail:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        totalOrders:
          type: integer
        completedOrders:
          type: integer
        totalSpentKwanza:
          type: number
        firstOrderDate:
          type: string
          nullable: true
        favoriteService:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [name, email, whatsapp, totalOrders, completedOrders, totalSpentKwanza, orders]

    UpdateClientNoteBody:
      type: object
      properties:
        note:
          type: string
      required: [note]

    ReportByService:
      type: object
      properties:
        service:
          type: string
        count:
          type: integer
        volumeKwanza:
          type: number
        revenue:
          type: number
        cost:
          type: number
        profit:
          type: number
        margin:
          type: number
      required: [service, count, volumeKwanza, revenue, cost, profit, margin]

    WeeklyFinancials:
      type: object
      properties:
        week:
          type: string
        revenue:
          type: number
        cost:
          type: number
        profit:
          type: number
      required: [week, revenue, cost, profit]

    AdminReportsResponse:
      type: object
      properties:
        month:
          type: integer
        year:
          type: integer
        totalOrders:
          type: integer
        completedOrders:
          type: integer
        cancelledOrders:
          type: integer
        completionRate:
          type: number
        volumeUsd:
          type: number
        volumeKwanza:
          type: number
        grossRevenue:
          type: number
        totalCost:
          type: number
        netProfit:
          type: number
        margin:
          type: number
        byService:
          type: array
          items:
            $ref: "#/components/schemas/ReportByService"
        weeklyFinancials:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyFinancials"
      required:
        - month
        - year
        - totalOrders
        - completedOrders
        - cancelledOrders
        - completionRate
        - volumeUsd
        - volumeKwanza
        - grossRevenue
        - totalCost
