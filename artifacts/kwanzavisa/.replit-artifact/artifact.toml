kind = "web"
previewPath = "/"
title = "KwanzaVisa"
version = "1.0.0"
id = "artifacts/kwanzavisa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20345

[services.development]
run = "pnpm --filter @workspace/kwanzavisa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kwanzavisa", "run", "build" ]
publicDir = "artifacts/kwanzavisa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20345"
BASE_PATH = "/"
